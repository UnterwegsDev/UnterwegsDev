name: telemetry

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telemetry
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: render panel
        run: python3 gadget/telemetry.py

      - name: commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "nothing to do"
            exit 0
          fi
          git config user.name "OneNobleSoul"
          git config user.email "75739931+OneNobleSoul@users.noreply.github.com"
          git add README.md
          git commit -m "telemetry: refresh panel"
          git push
